name: security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security:
    name: pnpm Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        timeout-minutes: 15

      - name: pnpm audit (report)
        continue-on-error: true
        run: pnpm audit --json > pnpm-audit.json 2>&1 || true
        timeout-minutes: 5

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit
          path: pnpm-audit.json
          retention-days: 30

      - name: Comment audit on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const audit = JSON.parse(fs.readFileSync('pnpm-audit.json', 'utf8'));
              const vulns = audit.metadata?.vulnerabilities || {};
              const { critical = 0, high = 0, moderate = 0, low = 0 } = vulns;
              const comment = `## Security Audit Results\n\n- Critical: ${critical}\n- High: ${high}\n- Moderate: ${moderate}\n- Low: ${low}`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (err) {
              console.error('Audit script error:', err.message);
            }
