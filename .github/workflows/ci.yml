name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Generate Next.js type declarations
        run: |
          echo '/// <reference types="next" />' > next-env.d.ts
          echo '/// <reference types="next/image-types/global" />' >> next-env.d.ts

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "1"
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
          STRIPE_SECRET_KEY: "sk_test_dummy_ci_key_not_real"
          STRIPE_WEBHOOK_SECRET: "whsec_dummy_ci_key_not_real"
          RESEND_API_KEY: "re_dummy_ci_key_not_real"
          ANTHROPIC_API_KEY: "sk-ant-dummy-ci-key-not-real"
          ELEVENLABS_API_KEY: "xi_dummy_ci_key_not_real"
          TWILIO_ACCOUNT_SID: "ACdummydummydummydummydummydummydumm"
          TWILIO_AUTH_TOKEN: "dummydummydummydummydummydummydumm"
          TWILIO_PHONE_NUMBER: "+15551234567"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        timeout-minutes: 10
